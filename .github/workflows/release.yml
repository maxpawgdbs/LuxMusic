name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew --no-daemon assembleDebug assembleRelease

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
            app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk
          body: |
            APK assets:
            - `app-arm64-v8a-debug.apk`: installable debug build
            - `app-arm64-v8a-release-unsigned.apk`: optimized unsigned release build
