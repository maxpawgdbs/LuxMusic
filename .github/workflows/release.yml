name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Verify and build APKs
        run: ./gradlew --no-daemon test assembleDebug assembleRelease lintVitalRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luxmusic-release-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
            app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk
          body: |
            APK assets:
            - `app-arm64-v8a-debug.apk`: installable debug build
            - `app-arm64-v8a-release-unsigned.apk`: optimized unsigned release build
