name: Release APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Set app version
        shell: bash
        run: |
          echo "LUXMUSIC_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "LUXMUSIC_VERSION_NAME=0.3.2-edge.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          else
            echo "LUXMUSIC_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Verify and build APKs
        run: ./gradlew --no-daemon test assembleDebug assembleRelease lintVitalRelease

      - name: Prepare GitHub release assets
        shell: bash
        run: |
          {
            echo 'RELEASE_FILES<<EOF'
            echo 'app/build/outputs/apk/release/app-release.apk'
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Update edge tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa edge -m "Edge build" "$GITHUB_SHA"
          git push origin refs/tags/edge --force

      - name: Publish GitHub release
        id: publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'edge' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'LuxMusic Edge' || github.ref_name }}
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          make_latest: ${{ github.ref == 'refs/heads/main' && 'false' || 'true' }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: ${{ env.RELEASE_FILES }}
          body: |
            APK assets:
            - `app-release.apk`: universal signed release build with bundled update-safe keystore
            - `versionCode` auto-increments on every workflow run, so edge releases install over previous ones
            - `edge` prerelease is updated automatically on every push to `main`
