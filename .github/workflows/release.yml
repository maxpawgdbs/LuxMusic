name: Release APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Prepare signing config
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/luxmusic-release.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/luxmusic-release.jks" >> "$GITHUB_ENV"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "SIGNED_RELEASE=true" >> "$GITHUB_ENV"
          else
            echo "SIGNED_RELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Verify and build APKs
        run: ./gradlew --no-daemon test assembleDebug assembleRelease lintVitalRelease

      - name: Update edge tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa edge -m "Edge build" "$GITHUB_SHA"
          git push origin refs/tags/edge --force

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luxmusic-release-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk

      - name: Publish GitHub release
        id: publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'edge' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'LuxMusic Edge' || github.ref_name }}
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          make_latest: ${{ github.ref == 'refs/heads/main' && 'false' || 'true' }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
            app/build/outputs/apk/release/*.apk
          body: |
            APK assets:
            - `app-arm64-v8a-debug.apk`: installable debug build
            - `app-arm64-v8a-release.apk`: signed release build when secrets are configured
            - `app-arm64-v8a-release-unsigned.apk`: fallback unsigned release build when signing secrets are missing
            - `edge` prerelease is updated automatically on every push to `main`
