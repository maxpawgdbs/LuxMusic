name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run verification
        run: ./gradlew --no-daemon test assembleDebug lintVitalRelease

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luxmusic-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luxmusic-reports
          path: |
            app/build/reports/**
            app/build/intermediates/lint_vital_intermediate_text_report/**
